name: PrM Dispatch
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID
        required: true
      studio_id:
        description: Studio S00-S51
        required: true
permissions:
  contents: read
  issues: write
  actions: write
jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: 1,
              body: "@prm ACK job_id=" + context.payload.inputs.job_id + " run=" + context.runId
            })
