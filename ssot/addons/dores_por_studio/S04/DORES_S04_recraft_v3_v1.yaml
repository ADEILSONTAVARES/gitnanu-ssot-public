    mitigacao: "Resolution mapping por canal — outdoor: 300dpi+, web: 72-96dpi, social: 150dpi"
    severity: HIGH
  - dor_id: D-S04-recraft_v3-15
    name: "Ausencia de variante dark mode do asset"
    sintoma: "Sistema que suporta dark mode recebe apenas versao light"
    causa_raiz: "Dark mode variant nao gerada automaticamente"
    mitigacao: "Dark mode variant gerada automaticamente para assets de UI — pares light/dark"
    severity: MEDIUM
