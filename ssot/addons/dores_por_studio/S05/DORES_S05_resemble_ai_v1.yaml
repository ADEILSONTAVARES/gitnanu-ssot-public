    mitigacao: "Quality comparison — MOS score comparativo entre versoes do mesmo clone"
    severity: MEDIUM
  - dor_id: D-S05-resemble_ai-15
    name: "Geracao sem fallback quando modelo indisponivel"
    sintoma: "Sintese falha se modelo especifico esta offline"
    causa_raiz: "Sem fallback para modelo base"
    mitigacao: "Model fallback — usar modelo base quando clone especifico indisponivel"
    severity: LOW
