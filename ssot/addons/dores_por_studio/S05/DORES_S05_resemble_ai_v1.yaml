    mitigacao: "Emoji normalization — converter emojis para descricao textual antes de sintetizar"
    severity: HIGH
  - dor_id: D-S05-resemble_ai-12
    name: "Sem limite de taxa de clonagem"
    sintoma: "Usuario pode criar 1000 clones sem restricao"
    causa_raiz: "Sem rate limit em voice cloning"
    mitigacao: "Rate limit em clonagem — maximo de clones por usuario por periodo"
    severity: MEDIUM
  - dor_id: D-S05-resemble_ai-13
    name: "Preview de emocao nao representativo"
    sintoma: "Preview mostra intensidade baixa mas output final usa intensidade alta"
    causa_raiz: "Preview nao usa mesmos parametros do output"
