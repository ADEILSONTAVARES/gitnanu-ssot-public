studio_id: S06
api: clarity_upscaler
version: 1
total_dores: 15
dores:
  - dor_id: D-S06-clarity_upscaler-01
    name: "Artefatos de alucinacao apos upscaling"
    sintoma: "Detalhes inventados que nao existiam na imagem original"
    causa_raiz: "Enhancement agressivo sem constraint de fidelidade"
    mitigacao: "Fidelity constraint — modo de upscaling com limite de hallucination"
    severity: CRITICAL
  - dor_id: D-S06-clarity_upscaler-02
    name: "Texto na imagem distorcido apos upscaling"
    sintoma: "Letras ficam ilegíveis após upscaling"
    causa_raiz: "Texto nao tratado como regiao especial"
    mitigacao: "Text region detection — aplicar OCR-guided upscaling em areas com texto"
    severity: HIGH
  - dor_id: D-S06-clarity_upscaler-03
    name: "Upscaling excessivo degradando qualidade"
    sintoma: "4x upscaling de imagem muito baixa res resulta em artefatos"
    causa_raiz: "Fator de upscaling sem limite baseado na resolucao original"
    mitigacao: "Resolution ratio limit — maximo de 4x sem alertar usuario, 8x requer confirmacao"
    severity: HIGH
  - dor_id: D-S06-clarity_upscaler-04
    name: "Faces deformadas apos upscaling"
    sintoma: "Rosto fica distorcido com proporcoes incorretas"
    causa_raiz: "Sem face-specific enhancement"
    mitigacao: "Face detection — aplicar face upscaling especializado em regioes de rosto"
    severity: HIGH
  - dor_id: D-S06-clarity_upscaler-05
    name: "Cor alterada apos upscaling"
    sintoma: "Saturacao e tonalidade diferentes da imagem original"
    causa_raiz: "Color preservation nao garantida"
    mitigacao: "Color preservation mode — calcular delta de cor e corrigir pos-upscaling"
    severity: MEDIUM
  - dor_id: D-S06-clarity_upscaler-06
    name: "Borda da imagem com artefatos"
    sintoma: "Pixels nas bordas com ruido ou distorcao"
