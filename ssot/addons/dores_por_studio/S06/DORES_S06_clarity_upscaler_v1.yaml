    severity: MEDIUM
  - dor_id: D-S06-clarity_upscaler-15
    name: "Custo por imagem nao informado antes do processamento"
    sintoma: "Usuario processa 500 imagens sem saber o custo total"
    causa_raiz: "Sem estimativa de custo pre-processamento"
    mitigacao: "Cost estimation pre-batch — exibir custo total estimado antes de iniciar lote"
