    mitigacao: "Border padding — adicionar padding antes do processamento e remover no output"
    severity: CRITICAL
  - dor_id: D-S06-clarity_upscaler-07
    name: "Processamento lento em imagens grandes"
    sintoma: "4K upscaling para 8K demora 5 minutos"
    causa_raiz: "Sem GPU acceleration ou tiling"
    mitigacao: "Tiled processing com GPU — processar em tiles paralelos para reduzir latencia"
    severity: HIGH
  - dor_id: D-S06-clarity_upscaler-08
    name: "Output sem comparacao antes/depois"
    sintoma: "Usuario nao consegue avaliar ganho do upscaling"
    causa_raiz: "Sem preview comparativo"
    mitigacao: "Side-by-side comparison obrigatorio — exibir original vs upscaled antes de confirmar"
    severity: HIGH
  - dor_id: D-S06-clarity_upscaler-09
    name: "Perda de granularidade em texturas"
    sintoma: "Textura de tecido ou pele fica plastificada"
    causa_raiz: "Enhancement suaviza texturas ao inves de preservar"
    mitigacao: "Texture preservation mode — detectar texturas e aplicar enhancement conservador"
    severity: MEDIUM
  - dor_id: D-S06-clarity_upscaler-10
    name: "Upscaling sem metadados de processamento"
    sintoma: "Impossivel saber qual algoritmo e parametros foram usados"
    causa_raiz: "Processing metadata nao salvo"
    mitigacao: "Processing metadata obrigatorio — algoritmo, fator, parametros salvos no EXIF"
    severity: HIGH
  - dor_id: D-S06-clarity_upscaler-11
    name: "Falha silenciosa em formato nao suportado"
    sintoma: "TIFF 16-bit enviado e processado como JPEG degradado"
