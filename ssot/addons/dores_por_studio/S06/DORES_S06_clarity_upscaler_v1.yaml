    mitigacao: "Format validation gate — rejeitar formatos nao suportados com mensagem clara"
    severity: MEDIUM
  - dor_id: D-S06-clarity_upscaler-12
    name: "Resultado diferente entre execucoes identicas"
    sintoma: "Mesmo input produz outputs diferentes"
