    mitigacao: "Deterministic mode — seed fixo para reproducibilidade garantida"
    severity: CRITICAL
  - dor_id: D-S06-clarity_upscaler-13
    name: "Sem suporte a processamento em lote"
    sintoma: "1000 imagens processadas uma por vez"
