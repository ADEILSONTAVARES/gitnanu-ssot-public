ssot_id: SECRETS_GUARD_SPEC
version: v1
status: CANONICAL
created_at: "2026-03-08"

meta:
  title: "GitNanu Secrets Guard - COCA-COLA LOCAL ONLY"
  nivel: CRITICAL
  compliance_target: "= 1.00 (zero leaks)"
  sistemas: [GitNanu, PrM, Mouse]

paths_protegidos:
  nunca_commitar:
    - "vault/"
    - "evidence_raw/"
    - ".env"
    - ".env.*"
    - "*.pem"
    - "*.key"
    - "secrets.yaml"
    - "credentials.json"
    - "logs/sensitive/"

patterns_de_secret:
  api_keys: ["sk-[a-zA-Z0-9]{20,}", "sk-ant-[a-zA-Z0-9-]{40,}", "AIza[0-9A-Za-z-_]{35}"]
  tokens_github: ["ghp_[a-zA-Z0-9]{36}", "github_pat_[a-zA-Z0-9_]{82}"]
  tokens_aws: ["AKIA[0-9A-Z]{16}"]

metricas:
  secret_leak_incidents: {target: "= 0"}
  scan_coverage: {target: "= 1.00"}
  false_positive_rate: {target: "<= 0.01"}
