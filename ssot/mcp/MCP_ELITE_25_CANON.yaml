  MCP_Studio_Route:
    nota: 9.3
    uso: "Roteia para Studio correto (S00-S51)"
    trigger: "U0 (routing)"
    confidence_min: 0.70
    fallback: "ASK_user se confidence < 0.70"
    latencia_p95: "10ms"

  MCP_Recipe_Playback:
    nota: 9.2
