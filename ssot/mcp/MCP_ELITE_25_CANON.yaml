# ============================================================
# GRUPO 1 - GOVERNANCA E SEGURANCA (8 MCPs)
# ============================================================

governanca_seguranca_8:

  MCP_AgentZero_Preflight:
    nota: 9.8
    spec: "ssot/quality/AGENTZERO_PREFLIGHT_SPEC.yaml"
    uso: "Preflight completo antes de qualquer operacao"
    formula: "4x3pQ2 10x10x10(2)"
    trigger: "pre-E1 (todo job)"
    lock_t: [T1, T2, T3, T4]
    latencia_p95: "50ms"

  MCP_Doctor1_Gates:
    nota: 9.4
    uso: "Gates basicos obrigatorios"
    trigger: "toda transicao PAC"
    checks: [syntax_yaml, no_secrets, no_placeholders, schema_basic]
    latencia_p95: "500ms"

  MCP_Doctor2_Deep:
    nota: 9.3
    uso: "Deep audit para operacoes criticas S42-S51"
    trigger: "studios_criticos + breaking_changes"
    checks: [full_schema_validation, integration_tests, blast_radius]
    latencia_p95: "2s"

  MCP_Coca_Guard:
    nota: 9.5
    uso: "Secrets e PII detection em todo output"
    trigger: "pre-commit + pre-chat + CI"
    patterns: ["sk-", "ghp_", "AKIA", "CPF", "SSN"]
    latencia_p95: "10ms"

  MCP_Evidence_Seal:
    nota: 9.8
    uso: "Seal evidence imutavel (hash + signature + timestamp)"
    trigger: "U2 (antes de ledger_write)"
    algoritmo: "SHA256 + Ed25519"
    latencia_p95: "50ms"
    invariant: "OBRIGATORIO - sem seal = job INVALID"

  MCP_TestSprite:
    nota: 9.2
    spec: "ssot/quality/TESTSPRITE_SPEC.yaml"
    uso: "Test harness automatico inline"
    trigger: "apos cada tool_call critico"
    latencia_p95: "100ms"

  MCP_Ralph_Loop:
    nota: 9.1
    spec: "ssot/quality/RALPH_LOOP_SPEC.yaml"
    uso: "Retry loop inteligente (exponential backoff)"
    trigger: "TestSprite fail OR Doctor1 warn"
    max_retries: 3
    latencia_p95: "7s (3 retries)"

  MCP_PHDMat_Full:
    nota: 9.4
    spec: "ssot/quality/PHDMAT_SPEC.yaml"
    uso: "Verificacao matematica forte anti-alucinacao"
    trigger: "S42-S51 + qualquer metrica numerica"
    latencia_p95: "200ms"

