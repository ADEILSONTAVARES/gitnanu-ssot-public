    trigger: "U2 (apos evidence_seal)"
    condicao: "relevancia >= 0.90 em >= 3 jobs"
    latencia_p95: "2s"

# ============================================================
# GRUPO 3 - EDITING E PATCHING (6 MCPs)
# ============================================================

editing_patching_6:

  MCP_Patch_Generate:
    nota: 9.3
    uso: "Gera patches minimos (<= 50 lines, <= 500 tokens)"
    trigger: "Mouse (Code mode)"
    limite_linhas: 50
    limite_tokens: 500
    limite_arquivos: 3
    latencia_p95: "500ms"

  MCP_Patch_Apply:
    nota: 9.5
    uso: "Aplica patches atomicamente (str_replace)"
    trigger: "apos MCP_Patch_Generate"
    atomicidade: true
    rollback_automatico: "se falhar"
    latencia_p95: "1s"

  MCP_Undo_Token_Create:
    nota: 10.0
    uso: "Cria token de rollback PERFEITO"
    trigger: "antes de qualquer Patch_Apply"
    invariant: "OBRIGATORIO antes de patch - sem token = BLOCK"
    latencia_p95: "100ms"
    score: "PERFEITO (10.0/10)"

  MCP_Rollback_Execute:
    nota: 10.0
    uso: "Executa rollback 100% success"
    trigger: "Patch_Apply fail OR usuario solicita"
    success_rate: "= 1.00"
    latencia_p95: "500ms"
    score: "PERFEITO (10.0/10)"

  MCP_CURA_1C:
    nota: 9.2
    uso: "Root cause analysis + patch minimo"
    trigger: "Doctor1 detecta erro OU TestSprite fail 3x"
    output: [root_cause, patch_minimo, risk_assessment]
    latencia_p95: "5s"

  MCP_AutoCura:
    nota: 9.1
    uso: "Self-healing completo (CURA-1C + apply + validate)"
    trigger: "CURA-1C com confidence >= 0.85"
    etapas: [diagnose, patch, apply, validate, seal]
    latencia_p95: "30s"

