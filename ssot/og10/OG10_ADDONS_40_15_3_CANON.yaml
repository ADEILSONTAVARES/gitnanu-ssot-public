pains_15:
  descricao: "Dores que acionam workers especializados em L1-L3"
  lista:
    - id: P01
      nome: Low_Confidence_Detected
      trigger: "confidence < 0.80"
      action: "Aciona o3 ou PHDMat"
    - id: P02
      nome: Complex_Reasoning_Required
      trigger: "reasoning_depth > 3"
      action: "Aciona o3 reasoning mode"
    - id: P03
      nome: High_Risk_Operation
      trigger: "risk_score >= 80"
      action: "Doctor2 + Double Approval"
    - id: P04
      nome: Critical_Domain
      trigger: "studio in [S42, S43, S44, S45, S46, S47, S48, S49, S50, S51]"
      action: "PHDMat + Evidence extended"
    - id: P05
      nome: Memory_Intensive
      trigger: "context > 100k tokens"
      action: "LTA lookup + Pointer fetch"
    - id: P06
      nome: Multi_Studio_Coordination
      trigger: "studios_involved >= 3"
      action: "SubAgent 60-5-30 completo"
    - id: P07
      nome: Real_Time_Constraint
      trigger: "latency_target < 500ms"
      action: "Cache aggressive + speculative"
    - id: P08
      nome: Cost_Sensitive
      trigger: "budget_tight"
      action: "Gemini Flash-Lite first"
    - id: P09
      nome: Quality_Critical
      trigger: "output_quality_target >= 95"
      action: "Polish 3x + Opus review"
    - id: P10
      nome: Data_Heavy
      trigger: "payload > 10MB"
      action: "Streaming + chunking"
    - id: P11
      nome: Concurrent_Users
      trigger: "concurrent_users > 100"
      action: "Rate limit + queue"
    - id: P12
      nome: Breaking_Change
      trigger: "schema_change_detected"
      action: "Rollback tested + ADR"
    - id: P13
      nome: Security_Alert
      trigger: "secrets_or_pii_detected"
      action: "Coca-Guard block + quarantine"
    - id: P14
      nome: Performance_Degradation
      trigger: "latency_spike > 2x_baseline"
      action: "I-Vierne investigate"
    - id: P15
      nome: Error_Storm
      trigger: "error_rate > 0.05 (1min window)"
      action: "Circuit breaker + AutoCura"

