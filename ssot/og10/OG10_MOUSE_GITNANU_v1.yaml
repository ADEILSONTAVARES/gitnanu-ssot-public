gitnanu:
  versao: "v8.0_ULTIMATE"
  score_final: "100/100"
  diferencial: "10x melhor que GitHub (conservador)"

  essencia: "GitNanu e o UNICO com write access ao repo. GitHub UI e read-only. PRs apenas via GitNanu."

  principios_fundamentais:
    No_Holes: "Sem arquivos faltando, sem campos faltando, sem etapas puladas"
    No_Duplicates: "Nada repetido com nomes diferentes, nada quase igual"
    No_Drift: "O que rodou precisa ter evidencia e bater com versionado"

  arquitetura_5_camadas:
    Mobile_Terminal:
      localizacao: "App celular (iOS/Android)"
      faz: ["Criacao de Talks (ate 4M tokens)", "Criacao de PACs (2k-12k tokens)", "Preview de mudancas", "Botao Aprovar -> Repo"]
      nao_faz: ["NAO comita direto no repo", "NAO tem credenciais do repo"]
    GNDrive_Sync:
      localizacao: "Cloudflare + Supabase"
      faz: ["Sync bidirecional Mobile <-> Desktop", "Storage de Talks/PACs/Drafts", "Evidence storage", "LATEST pointer management"]
    Desktop_Executor:
      localizacao: "Mac/Windows/Linux daemon"
      faz: ["Listener de PACs aprovados", "Doctor gates", "Git operations", "CI monitoring", "Evidence generation"]
    Repo_SSOT:
      localizacao: "GitHub (storage apenas)"
      acesso: "APENAS GitNanu runtime tem write access"
    CI_Validation:
      localizacao: "GitHub Actions"
      faz: ["Doctor gates STRICT", "Full test suite", "Security scanning", "SSOT validation completa"]

  pac_system:
    formula: "2k-12k tokens por PAC"
    estados: [DRAFT, READY, REVIEW, APPROVED, APPLIED, MERGED, PUBLISHED, ARCHIVED]
    max_iterations: 500
    stop_conditions:
      - "no_diff: resultado igual ao anterior"
      - "tests_green: todos testes passaram"
      - "doctor_pass: gates passaram"
      - "budget_exhausted"
    scope_lock: "PAC so pode tocar arquivos declarados no header"

  security:
    coca_cola_guard:
      patterns_detectados:
        api_keys: ["sk-[a-zA-Z0-9]{48}", "sk_live_[a-zA-Z0-9]{24}", "AKIA[A-Z0-9]{16}", "ghp_[a-zA-Z0-9]{36}"]
        pii: ["CPF: \\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}", "SSN: \\d{3}-\\d{2}-\\d{4}"]
      execution_points: [pre-commit, pre-push, CI_pipeline, export_code-only, GNDrive_publish]
    repo_access_barrier:
      allowed: ["gitnanu_runtime", "ci_github_actions"]
      forbidden: ["gitruly_agents", "manual_commits", "third_party_apps"]

  doctor_gates:
    doctor_local_fast:
      quando: ["pre-commit hook", "gitnanu apply <pac_id>"]
      checks: [ssot_check, coca_guard, lint_basic]
      timeout_total: "45s"
    doctor_ci_strict:
      quando: ["every push", "every PR"]
      checks: [all_local, integration_tests, security_scan, ssot_deep]
    gates_por_risco:
      low: {gates: [ssot_check, coca_guard], approval: auto}
      medium: {gates: [doctor_local, lint, tests_unit], approval: "auto ou manual"}
      high: {gates: [doctor_ci_strict, tests_integration, security_scan], approval: manual_obrigatorio}
      critical: {gates: [all, compliance_check, blast_radius], approval: "double + ADR"}

  gitnanu_prm_integration:
    fluxo_prm_pede_mudanca:
      1: "PrM valida intencao e gera scope + files"
      2: "PrM chama: gitnanu create-pac"
      3: "GitNanu roda Doctor local"
      4: "PrM revisa diff e aprova"
      5: "GitNanu: worktree -> patch -> commit -> push -> PR"
    prm_nao_pode:
