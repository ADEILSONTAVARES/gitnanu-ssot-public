  apply_to: "todos os 52 Studios (S00-S51)"

etapas:
  - id: E1
    nome: intake
    tokens: 60
    responsavel: "U0 (Intake + Router)"
    objetivo: "Classificar pedido, estimar risco, rotear para Studio"
    output: "routing_decision.json"
    custo_layer: L0

  - id: E2
    nome: context_build
    tokens: 60
    responsavel: "U1 (Context7x + MCPContext)"
    objetivo: "Montar contexto mínimo necessário (7 camadas)"
    output: "context_pack.json"
    custo_layer: L0

  - id: E3
    nome: retrieval
    tokens: 60
    responsavel: "U1 (RAG3TrimTwin)"
    objetivo: "Buscar evidências nas 7 famílias RAG"
    output: "retrieval_brief.json"
    custo_layer: L0

  - id: E4
    nome: reasoning
    tokens: 150
    tokens_critical: 200
    responsavel: "Worker LLM ou SubAgent 60-5-30"
    objetivo: "Raciocínio profundo, análise, decisão"
    output: "job_result.json"
    custo_layer: L1_L3

  - id: E5
    nome: validation
    tokens: 150
    tokens_critical: 200
    responsavel: "Doctor1 + TestSprite + QA Coringão"
    objetivo: "Validar output, rodar gates, testar"
    output: "validation_report.json"
    custo_layer: L0

  - id: E6
    nome: output_polish
    tokens: 300
    formula_detalhe: "100 x 3 ciclos (draft → refine → final)"
    responsavel: "U2 (Prove + Close)"
    objetivo: "Formatar, selar evidence, finalizar"
    output: "evidence_pack.manifest.json"
    custo_layer: L0

regras:
