    custo_relativo: "3x"
  tier_medium:
    modelos: ["claude-sonnet-4-5", "gpt-5-2"]
    uso: "main agent, code worker"
    custo_relativo: "10x"
  tier_high:
    modelos: ["o3"]
    uso: "controller (decisões críticas)"
    custo_relativo: "30x"
  tier_premium:
    modelos: ["claude-opus-4-6"]
