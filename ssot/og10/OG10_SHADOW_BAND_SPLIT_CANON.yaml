ssot_id: OG10_SHADOW_BAND_SPLIT_CANON
version: v1
status: CANONICAL
created_at: "2026-03-08"

meta:
  title: "OG10 Shadow Band + Split 85/15 — Orçamento Canônico"
  cost_target_per_job: "$0.000141"
  shadow_band: "0.3-0.6% do budget total"

split_85_15:
  l0_deterministic:
    share: 0.85
    descricao: "Camada determinística — custo base fixo"
    componentes:
      - "Skills U0/U1/U2 (85% do trabalho)"
      - "MCPs always-on (12 addons L0)"
      - "Doctor gates locais"
      - "Cache lookups"
      - "Evidence seal"
      - "PAC montagem"
