pac_tamanhos:
  micro:  {tokens: 2000,  uso: "respostas rapidas L0"}
  small:  {tokens: 4000,  uso: "tarefas simples"}
  medium: {tokens: 8000,  uso: "tarefas medias"}
  large:  {tokens: 12000, uso: "tarefas complexas L1-L3"}
