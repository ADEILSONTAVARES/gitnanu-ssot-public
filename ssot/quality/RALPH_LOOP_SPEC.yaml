ssot_id: RALPH_LOOP_SPEC
version: v1
status: CANONICAL
created_at: "2026-03-08"

meta:
  title: "Ralph Loop - Retry Inteligente"
  tipo: "MCP aprovado (nota 9.2/10)"
  quando: "acionado por TestSprite ou Doctor1 em falha"
  sistemas: [PrM, U1]

funcao:
  descricao: "Sistema de retry inteligente com backoff exponencial"
  principio: "nao repetir o mesmo erro - cada retry usa estrategia diferente"

estrategias_retry:
  retry_1: {descricao: "Retry direto", espera: "1s", uso: "erro transiente"}
  retry_2: {descricao: "Retry com contexto expandido", espera: "2s", uso: "falta de contexto"}
  retry_3: {descricao: "Retry com modelo alternativo", espera: "4s", uso: "erro de qualidade"}

escalacao_pos_retry:
  apos_3_falhas: "escalar para Doctor1"
  doctor1_falha: "escalar para Controller (I-Vierne)"
  controller_falha: "job FAILED com evidence de falha"

limites:
  max_retries_por_job: 3
  timeout_total_retries: "30s"
  custo_max_retries: "1.5x custo estimado original"

metricas:
  retry_success_rate: {target: ">= 0.90"}
  retry_trigger_rate: {target: "<= 0.08"}
  escalacao_doctor_rate: {target: "<= 0.02"}
