fluxo:
  trigger: "apos cada tool_call critico ou apos E4 (reasoning)"
  execucao: "paralelo (todos os tipos em paralelo)"
  timeout: "100ms total"
  resultado_fail: "acionar Ralph Loop (retry)"

metricas:
  test_pass_rate: {target: ">= 0.97"}
  false_fail_rate: {target: "<= 0.01"}
  latencia_total_p95: {target: "<= 100ms"}
  retry_trigger_rate: {target: "<= 0.05"}
