registry_id: SCORE_FUNCTION_REGISTRY
version: v1
description: Registry das funcoes de score OG10 aplicadas ao Mouse Inteligente
formula: F*0.45 + V*0.35 + E*0.20
components:
  F:
    weight: 0.45
    label: Funcionalidade
    min_pass: 8.5
  V:
    weight: 0.35
    label: Velocidade e eficiencia
    min_pass: 8.5
  E:
    weight: 0.20
    label: Evidencia e governanca
    min_pass: 8.5
score_gates:
  minimum_delivery: 8.5
  target_og10: 9.6
  nota_10_threshold: 10.0
score_states:
  TARGET: score estimado antes de evidence real
  MEASURED: score medido com evidence real e CI verde
rules:
  - TARGET e MEASURED nunca se misturam
  - Sem evidence_pack => measured nao existe
  - Sem measured => sem PASS_STRICT
  - Sem PASS_STRICT => sem merge
ssot_pointer: docs/ssot/mouse/MOUSE_INTELIGENTE_MASTER_SSOT_v10_1.md
