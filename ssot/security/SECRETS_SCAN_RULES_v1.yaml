ssot_id: SECRETS_SCAN_RULES_v1
version: v1
status: CANONICAL
created_at: "2026-03-09"

meta:
  title: "Secrets Scan Rules — regras detalhadas COCA Guard"
  pointer_policy: "ssot/security/SECRET_SCAN_POLICY_v1.yaml"
  validator: "scripts/validators/secret_scan_light.py"

regras_por_categoria:

  api_keys_llm:
    - {id: SS01, pattern: "sk-proj-", severity: CRITICAL, provider: "OpenAI project key"}
    - {id: SS02, pattern: "sk-", severity: CRITICAL, provider: "OpenAI legacy"}
    - {id: SS03, pattern: "ant-", severity: CRITICAL, provider: "Anthropic"}
    - {id: SS04, pattern: "AIza", severity: HIGH, provider: "Google AI"}

  vcs_tokens:
    - {id: SS10, pattern: "ghp_", severity: CRITICAL, provider: "GitHub PAT"}
    - {id: SS11, pattern: "github_pat_", severity: CRITICAL, provider: "GitHub fine-grained"}
    - {id: SS12, pattern: "gho_", severity: HIGH, provider: "GitHub OAuth"}

  cloud_infra:
    - {id: SS20, pattern: "AKIA", severity: CRITICAL, provider: "AWS Access Key"}
    - {id: SS21, pattern: "ASIA", severity: HIGH, provider: "AWS temp key"}
    - {id: SS22, pattern: "AIPA", severity: HIGH, provider: "AWS IAM key"}

  payments:
    - {id: SS30, pattern: "sk_live_", severity: CRITICAL, provider: "Stripe live key"}
    - {id: SS31, pattern: "sk_test_", severity: HIGH, provider: "Stripe test key"}

  pii_brasil:
    - {id: SS40, pattern: "CPF", severity: HIGH, descricao: "CPF brasileiro"}
    - {id: SS41, pattern: "CNPJ", severity: HIGH, descricao: "CNPJ brasileiro"}
    - {id: SS42, pattern: "RG", severity: MEDIUM, descricao: "RG brasileiro"}

  crypto:
    - {id: SS50, pattern: "BEGIN RSA PRIVATE KEY", severity: CRITICAL}
    - {id: SS51, pattern: "BEGIN EC PRIVATE KEY", severity: CRITICAL}
    - {id: SS52, pattern: "BEGIN OPENSSH PRIVATE KEY", severity: CRITICAL}

acoes_por_severity:
  CRITICAL: "BLOCK imediato + quarantine + Doctor1 alerta"
  HIGH: "BLOCK + log + revisao manual"
  MEDIUM: "WARN + log (nao bloqueia)"

whitelist:
  processo: "revisao Council antes de adicionar qualquer whitelist"
  zero_excecoes_para_CRITICAL: true
