ssot_id: SECRET_SCAN_POLICY_v1
version: v1
status: CANONICAL
created_at: "2026-03-09"

meta:
  title: "Secret Scan Policy — COCA Guard completo"
  sistema: NANUCAI OG10
  mcp: "MCP_Coca_Guard"
  validator: "scripts/validators/secret_scan_light.py"

patterns_bloqueados:
  api_keys:
    - {pattern: "sk-", descricao: "OpenAI key"}
    - {pattern: "ghp_", descricao: "GitHub token"}
    - {pattern: "AKIA", descricao: "AWS Access Key"}
    - {pattern: "xoxb-", descricao: "Slack bot token"}
    - {pattern: "xoxp-", descricao: "Slack user token"}
  pii:
    - {pattern: "CPF", descricao: "CPF brasileiro"}
    - {pattern: "SSN", descricao: "Social Security Number"}
    - {pattern: "CNPJ", descricao: "CNPJ brasileiro"}
  infra:
    - {pattern: "BEGIN RSA PRIVATE KEY", descricao: "Chave RSA"}
    - {pattern: "BEGIN EC PRIVATE KEY", descricao: "Chave EC"}
    - {pattern: "password:", descricao: "Senha em plaintext"}

contextos_de_scan:
  - "pre-commit (GitNanu)"
  - "pre-chat (todo output ao usuario)"
  - "CI/CD (GitHub Actions)"
  - "pre-LTA (antes de promocao)"

acao_ao_detectar:
  imediata: "BLOCK output + quarantine_flag = true"
  notificacao: "Doctor1 alerta + job pausado"
  log: "vault_local/security/scan_violations/{timestamp}.json"
  coca_local_only: true

latencia_p95: "10ms"
false_positive_policy: "revisao manual pelo Council antes de whitelist"

invariants:
  - "Zero tolerance para secrets em repo publico"
  - "Scan roda em TODOS os outputs sem excecao"
  - "PASS em secret_scan_light.py obrigatorio para PASS_STRICT"
