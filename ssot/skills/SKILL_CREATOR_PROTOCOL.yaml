ssot_id: SKILL_CREATOR_PROTOCOL
version: v1
status: CANONICAL
created_at: "2026-03-08"

meta:
  title: "Skill Creator Protocol - Como Criar Novas Skills"
  sistemas: [PrM, GitNanu]

criterios_para_nova_skill:
  necessidade:
    - "tarefa recorre em >= 3 jobs distintos"
    - "tarefa tem logica reutilizavel"
    - "tarefa nao esta coberta por U0/U1/U2 nem micro skills"
  qualidade:
    - "skill e testavel (tem inputs/outputs definidos)"
    - "skill e atomica (faz uma coisa bem)"
  governanca:
    - "skill nao viola COCA-COLA LOCAL ONLY"
    - "custo estimado dentro da shadow band"

processo_de_criacao:
  passo_1: "Rascunhar spec YAML em ssot/skills/ (estado DRAFT)"
  passo_2: "Rodar MS02_schema_check para validar estrutura"
  passo_3: "Testar com 3 jobs reais (coleta evidencia)"
  passo_4: "PHDMat valida metricas declaradas"
  passo_5: "Doctor1 aprova a skill"
  passo_6: "Adicionar no MICRO_SKILLS_REGISTRY ou SKILLS_UNIVERSAIS"
  passo_7: "GitNanu commita com evidence_ref"

metricas:
  skills_aprovadas_total: {target: ">= 15 (U0/U1/U2 + 12 micro)"}
  skill_utilization: {target: ">= 0.70"}
  skill_quality_score: {target: ">= 9.0/10 para aprovacao"}
