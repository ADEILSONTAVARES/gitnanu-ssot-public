  campos_opcionais:
    - contexto_anterior: pac_ref
    - modo_forcado: "SAFE | ULTRA | CRITICAL | DEEP"
    - budget_override_usd: number
contrato_saida:
  campos_obrigatorios:
    - studio_id: "S00-S51"
    - familia_api: "llm | media | infra | dev | search | payments | comms"
    - modo: "SAFE | ULTRA | CRITICAL | DEEP"
    - engine_id: string
    - adapter_id: string
    - pac_id: string
    - risk_level: "LOW | MEDIUM | HIGH | CRITICAL"
    - budget_cap_usd: number
    - shadow_band: "0% | 0.3% | 0.6% | 1.0% | 2.0%"
    - tokens_cap: integer
    - latencia_max_ms: integer
    - council_required: boolean
    - thinking_required: boolean
  formato_saida: JSON
modos_operacionais:
  SAFE:
    descricao: "Pedido simples, baixo risco, L0 puro"
    shadow_band_max: "0.3%"
    council: false
    thinking: false
  ULTRA:
    descricao: "Alta qualidade, multiplas engines, polish ativo"
    shadow_band_max: "0.6%"
    council: false
    thinking: false
  CRITICAL:
    descricao: "Risco alto, Doctor2 obrigatorio, evidence seal"
    shadow_band_max: "1.0%"
    council: true
    thinking: true
  DEEP:
    descricao: "Pedido explicito de thinking, PHDMat ou AutoCura Full"
    shadow_band_max: "2.0%"
    council: true
    thinking: true
classificacao_risco:
